<!DOCTYPE html>
<html>
<head>
    <title>Ultra AI Spam Detector</title>

    <style>
        /* Modern UI Style with Dark & Light Theme */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 30px;
            background: #0f172a; /* Futuristic Deep Dark Blue */
            color: #f8fafc;
            transition: all 0.4s ease;
        }

        .light {
            background: #f1f5f9;
            color: #0f172a;
        }

        h1 {
            font-size: 2.5rem;
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.5);
            margin-bottom: 25px;
        }

        /* Glassmorphism Main Container */
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            transition: all 0.3s;
        }

        .light .container {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        textarea {
            width: 90%;
            height: 120px;
            border-radius: 12px;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #38bdf8;
            background: rgba(15, 23, 42, 0.6);
            color: white;
            outline: none;
            resize: none;
            transition: all 0.3s;
            margin-bottom: 5px;
        }

        .light textarea {
            background: #ffffff;
            color: #0f172a;
        }

        textarea:focus {
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.8);
        }

        /* Live Counter Styling */
        .counter-div {
            width: 95%;
            margin: 0 auto 15px auto;
            text-align: right;
            font-size: 13px;
            color: #94a3b8;
        }

        /* Interactive Buttons */
        button {
            padding: 12px 24px;
            margin: 8px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .btn-check { background: #38bdf8; color: white; }
        .btn-check:hover { background: #0284c7; transform: translateY(-2px); }

        .btn-voice { background: #a855f7; color: white; }
        .btn-voice:hover { background: #7e22ce; transform: translateY(-2px); }

        .btn-mode { background: #64748b; color: white; }
        .btn-mode:hover { background: #475569; transform: translateY(-2px); }

        .btn-clear { background: #ef4444; color: white; }
        .btn-clear:hover { background: #dc2626; transform: translateY(-2px); }

        .btn-action { background: #22c55e; color: white; }
        .btn-feedback { background: #eab308; color: black; }

        /* Smooth Loading Animation Container */
        #loading-container {
            display: none;
            margin: 20px auto;
            font-weight: bold;
            color: #38bdf8;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border-left-color: #38bdf8;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Neon Progress Bar */
        #bar {
            width: 80%;
            height: 15px;
            background: #334155;
            margin: 25px auto;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #fill {
            height: 100%;
            width: 0%;
            background: #4ade80;
            border-radius: 10px;
            transition: width 0.5s ease-in-out, background-color 0.5s ease;
        }

        /* Dynamic Security Badge */
        .badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 1px;
            background: #475569;
            color: white;
        }
        .badge-safe { background: #16a34a; color: white; box-shadow: 0 0 10px rgba(22,163,74,0.5); }
        .badge-warning { background: #ca8a04; color: white; box-shadow: 0 0 10px rgba(202,138,4,0.5); }
        .badge-danger { background: #dc2626; color: white; box-shadow: 0 0 10px rgba(220,38,38,0.5); }

        /* Result & Output Box */
        #result-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
        }

        #result {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        #warning {
            font-size: 14px;
            color: #cbd5e1;
            line-height: 1.6;
        }

        .light #warning { color: #475569; }

        /* History Cards */
        .history-box {
            margin-top: 35px;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
        }

        .light .history-box { background: rgba(255, 255, 255, 0.5); border: 1px solid #cbd5e1; }
    </style>
</head>

<body>

<div class="container">
    <h1>🤖 Ultra AI Spam Detector</h1>

    <textarea id="text" placeholder="Type or speak message here..." oninput="updateCounters()"></textarea><br>
    <div class="counter-div">
        <span id="charCount">0</span> Characters | <span id="wordCount">0</span> Words
    </div>

    <button class="btn-check" onclick="startAnalysis()">✨ Analyze Message</button>
    <button class="btn-voice" onclick="startVoice()">🎤 Speak</button>
    <button class="btn-clear" onclick="clearAll()">🧹 Clear</button>
    <button class="btn-mode" onclick="toggleMode()">🌗 Switch Mode</button>

    <div id="loading-container">
        <div class="spinner"></div>
        <span>AI is scanning text matrix...</span>
    </div>

    <div id="bar"><div id="fill"></div></div>

    <div id="securityBadge" class="badge">System Ready</div>

    <div id="result-box">
        <div id="result">Waiting for text scanning...</div>
        <div id="warning"></div>
    </div>

    <div style="margin-top: 20px;">
        <button class="btn-action" onclick="copyResult()">📋 Copy Result</button>
        <button class="btn-feedback" onclick="markSpam()">🚫 Train Spam</button>
        <button class="btn-feedback" onclick="markSafe()">🛡️ Train Safe</button>
    </div>

    <h3>🧾 Audit Log History</h3>
    <div class="history-box" id="history"></div>
</div>

<script>
// Live Word and Character Counter Function
function updateCounters() {
    let text = document.getElementById("text").value;
    document.getElementById("charCount").innerText = text.length;
    
    let words = text.trim().split(/\s+/).filter(w => w.length > 0);
    document.getElementById("wordCount").innerText = words.length;
}

// Delay execution to show animated AI Scanning progress
function startAnalysis() {
    let text = document.getElementById("text").value.trim();
    if (!text) {
        alert("Please enter some text first!");
        return;
    }
    
    // Show spinner and reset previous results
    document.getElementById("loading-container").style.display = "block";
    document.getElementById("result").innerText = "Analyzing...";
    document.getElementById("warning").innerHTML = "";
    document.getElementById("fill").style.width = "0%";
    document.getElementById("securityBadge").className = "badge";
    document.getElementById("securityBadge").innerText = "Scanning...";

    setTimeout(detect, 1500); // 1.5 Seconds Animation Delay
}

function detect() {
    // Hide loading animation
    document.getElementById("loading-container").style.display = "none";

    let text = document.getElementById("text").value;
    let lower = text.toLowerCase();

    let words = ["free","win","urgent","click","offer","otp","bank","prize","lottery","subscribe","claim","money","cash"];
    let score = 0;
    let reasons = [];
    let personality = [];

    words.forEach(w=>{
        if(lower.includes(w)){
            score++;
            reasons.push(w);
        }
    });

    if(lower.includes("http")){
        score++;
        reasons.push("URL link");
    }

    let links = ["bit.ly","tinyurl",".xyz",".ru"];
    links.forEach(l=>{
        if(lower.includes(l)){
            score += 2;
            reasons.push("Suspicious short-link (" + l + ")");
        }
    });

    if(text === text.toUpperCase() && text.length > 5){
        personality.push("Aggressive formatting (ALL CAPS)");
    }

    if((text.match(/!/g) || []).length > 2){
        personality.push("High pressure punctuation (!!!)");
    }

    if(lower.includes("urgent") || lower.includes("immediately") || lower.includes("now")){
        personality.push("Artificial urgency tactic");
    }

    let percent = Math.min(score * 15, 100);
    let trust = 100 - percent;

    let fillBar = document.getElementById("fill");
    let badge = document.getElementById("securityBadge");
    fillBar.style.width = percent + "%";

    let resultText = "";
    
    // Dynamic Meter Logic and Badges
    if(percent > 50){
        resultText = "🚨 Spam Threat Detected!";
        fillBar.style.backgroundColor = "#dc2626"; // Red Bar
        badge.className = "badge badge-danger";
        badge.innerText = "Malicious Threat";
        new Audio("https://www.soundjay.com/button/beep-07.wav").play();
    } else if(percent > 20){
        resultText = "⚠️ Suspicious Activity Warning";
        fillBar.style.backgroundColor = "#ca8a04"; // Yellow Bar
        badge.className = "badge badge-warning";
        badge.innerText = "Suspicious Content";
    } else {
        resultText = "✅ Safe Verified Message";
        fillBar.style.backgroundColor = "#16a34a"; // Green Bar
        badge.className = "badge badge-safe";
        badge.innerText = "AI Verified Safe";
    }

    let category = "General Communication";
    if(lower.includes("bank") || lower.includes("otp")) category = "Financial Phishing Scam";
    if(lower.includes("win") || lower.includes("lottery") || lower.includes("prize")) category = "Lottery Fraud";
    if(lower.includes("urgent")) category = "Blackmail/Urgent Scam";

    document.getElementById("result").innerHTML = resultText;

    document.getElementById("warning").innerHTML =
        "📊 <b>Spam Probability:</b> " + percent + "%" + " | 🔒 <b>Trust Index:</b> " + trust + "%" +
        "<br>📂 <b>Threat Profile:</b> " + category +
        "<br>🔍 <b>Trigger Elements:</b> " + (reasons.length > 0 ? reasons.join(", ") : "None") +
        "<br>🧠 <b>Behavioral Pattern:</b> " + (personality.length > 0 ? personality.join(", ") : "Normal");

    // Save history logs
    let old = localStorage.getItem("history") || "";
    let logEntry = "<p style='margin:5px 0; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:5px;'>• " + text.substring(0, 30) + "... → <b>" + resultText + "</b></p>";
    localStorage.setItem("history", logEntry + old);
    document.getElementById("history").innerHTML = localStorage.getItem("history");
}

function startVoice(){
    let rec = new webkitSpeechRecognition();
    rec.onresult = function(e){
        document.getElementById("text").value = e.results[0][0].transcript;
        updateCounters();
    }
    rec.start();
}

function toggleMode(){
    document.body.classList.toggle("light");
}

function clearAll() {
    document.getElementById("text").value = "";
    document.getElementById("result").innerText = "Waiting for text scanning...";
    document.getElementById("warning").innerHTML = "";
    document.getElementById("fill").style.width = "0%";
    document.getElementById("fill").style.backgroundColor = "#4ade80";
    document.getElementById("securityBadge").className = "badge";
    document.getElementById("securityBadge").innerText = "System Ready";
    updateCounters();
}

function copyResult() {
    let resultText = document.getElementById("result").innerText;
    let details = document.getElementById("warning").innerText;
    if(resultText === "Waiting for text scanning...") {
        alert("No results to copy!");
        return;
    }
    navigator.clipboard.writeText(resultText + "\n" + details);
    alert("Analysis data copied to clipboard! 📋");
}

function markSpam(){
    localStorage.setItem("feedback","Spam");
    alert("AI Algorithm updated: Logged as Threat Vector.");
}

function markSafe(){
    localStorage.setItem("feedback","Safe");
    alert("AI Algorithm updated: Logged as Verified Clean.");
}

// Load Audit History Logs
document.getElementById("history").innerHTML = localStorage.getItem("history") || "No logs available.";
</script>

</body>
</html>
